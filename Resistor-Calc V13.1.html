<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resistor Combination Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f5f5f5;
    }
    .container {
      max-width: 1000px;
      margin: auto;
      background: white;
      padding: 24px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 { margin-top: 0; font-size: 1.4rem; }
    .input-row { margin-bottom: 14px; }
    label { font-weight: bold; display: block; margin-bottom: 4px; }
    input[type=number], select {
      width: 100%;
      padding: 9px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
    }
    .series-info { font-size: 0.82rem; color: #666; margin-top: 4px; }
    button {
      padding: 10px 28px;
      font-size: 1rem;
      background: #2255cc;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #1144aa; }
    #output { margin-top: 22px; }

    /* Pair of cards side by side */
    .card-row {
      display: flex;
      gap: 14px;
      margin-bottom: 14px;
    }
    .card-row .card {
      flex: 1;
      margin-bottom: 0;
    }

    .card {
      background: #f0f4ff;
      border-left: 4px solid #2255cc;
      border-radius: 7px;
      padding: 14px 18px;
      margin-bottom: 14px;
    }
    .card h3 { margin: 0 0 10px 0; font-size: 1rem; color: #1a3a99; }
    .card-body {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card-diagram { flex-shrink: 0; }
    .card-diagram svg { display: block; }
    .card-table { flex: 1; }
    .card-table table { border-collapse: collapse; width: 100%; font-size: 0.93rem; }
    .card-table td { padding: 3px 6px; }
    .card-table td:first-child { color: #555; width: 50%; }
    .card-table td:last-child { font-weight: bold; }
    .error-good { color: #1a7a1a; }
    .error-ok   { color: #b07000; }
    .error-bad  { color: #cc2222; }
    .loading { color: #888; font-style: italic; }
    .wire    { stroke: #333; stroke-width: 1.8; fill: none; }
    .res     { stroke: #2255cc; stroke-width: 1.8; fill: #dce8ff; }
    .res-lbl { font-size: 9px; fill: #1a3a99; text-anchor: middle;
               font-family: Arial; font-weight: bold; }
    .node    { fill: #333; }
    .term    { stroke: #333; stroke-width: 2; fill: none; stroke-linecap: round; }
  </style>
</head>
<body>
<div class="container">
  <h1>Resistor Combination Calculator</h1>

  <div class="input-row">
    <label for="eseries">E-Series:</label>
    <select id="eseries" onchange="updateSeriesInfo()">
      <option value="E6">E6 — 6 values/decade (20% tolerance)</option>
      <option value="E12" selected>E12 — 12 values/decade (10% tolerance)</option>
      <option value="E24">E24 — 24 values/decade (5% tolerance)</option>
      <option value="E48">E48 — 48 values/decade (2% tolerance)</option>
      <option value="E96">E96 — 96 values/decade (1% tolerance)</option>
      <option value="E192">E192 — 192 values/decade (0.5% tolerance)</option>
    </select>
    <div class="series-info" id="seriesInfo"></div>
  </div>

  <div class="input-row">
    <label for="target">Target Resistance (Ω):</label>
    <input type="number" id="target" step="any" placeholder="e.g. 1234" />
  </div>

  <button onclick="calculate()">Calculate</button>
  <div id="output"></div>
</div>

<script>
  const E_SERIES = {
    E6:   [1.0, 1.5, 2.2, 3.3, 4.7, 6.8],
    E12:  [1.0, 1.2, 1.5, 1.8, 2.2, 2.7, 3.3, 3.9, 4.7, 5.6, 6.8, 8.2],
    E24:  [1.0,1.1,1.2,1.3,1.5,1.6,1.8,2.0,2.2,2.4,2.7,3.0,
           3.3,3.6,3.9,4.3,4.7,5.1,5.6,6.2,6.8,7.5,8.2,9.1],
    E48:  [1.00,1.05,1.10,1.15,1.21,1.27,1.33,1.40,1.47,1.54,1.62,1.69,
           1.78,1.87,1.96,2.05,2.15,2.26,2.37,2.49,2.61,2.74,2.87,3.01,
           3.16,3.32,3.48,3.65,3.83,4.02,4.22,4.42,4.64,4.87,5.11,5.36,
           5.62,5.90,6.19,6.49,6.81,7.15,7.50,7.87,8.25,8.66,9.09,9.53],
    E96:  [1.00,1.02,1.05,1.07,1.10,1.13,1.15,1.18,1.21,1.24,1.27,1.30,
           1.33,1.37,1.40,1.43,1.47,1.50,1.54,1.58,1.62,1.65,1.69,1.74,
           1.78,1.82,1.87,1.91,1.96,2.00,2.05,2.10,2.15,2.21,2.26,2.32,
           2.37,2.43,2.49,2.55,2.61,2.67,2.74,2.80,2.87,2.94,3.01,3.09,
           3.16,3.24,3.32,3.40,3.48,3.57,3.65,3.74,3.83,3.92,4.02,4.12,
           4.22,4.32,4.42,4.53,4.64,4.75,4.87,4.99,5.11,5.23,5.36,5.49,
           5.62,5.76,5.90,6.04,6.19,6.34,6.49,6.65,6.81,6.98,7.15,7.32,
           7.50,7.68,7.87,8.06,8.25,8.45,8.66,8.87,9.09,9.31,9.53,9.76],
    E192: [1.00,1.01,1.02,1.04,1.05,1.06,1.07,1.09,1.10,1.11,1.13,1.14,
           1.15,1.17,1.18,1.20,1.21,1.23,1.24,1.26,1.27,1.29,1.30,1.32,
           1.33,1.35,1.37,1.38,1.40,1.42,1.43,1.45,1.47,1.49,1.50,1.52,
           1.54,1.56,1.58,1.60,1.62,1.64,1.65,1.67,1.69,1.72,1.74,1.76,
           1.78,1.80,1.82,1.84,1.87,1.89,1.91,1.93,1.96,1.98,2.00,2.03,
           2.05,2.08,2.10,2.13,2.15,2.18,2.21,2.23,2.26,2.29,2.32,2.34,
           2.37,2.40,2.43,2.46,2.49,2.52,2.55,2.58,2.61,2.64,2.67,2.71,
           2.74,2.77,2.80,2.84,2.87,2.91,2.94,2.98,3.01,3.05,3.09,3.12,
           3.16,3.20,3.24,3.28,3.32,3.36,3.40,3.44,3.48,3.52,3.57,3.61,
           3.65,3.70,3.74,3.79,3.83,3.88,3.92,3.97,4.02,4.07,4.12,4.17,
           4.22,4.27,4.32,4.37,4.42,4.48,4.53,4.59,4.64,4.70,4.75,4.81,
           4.87,4.93,4.99,5.05,5.11,5.17,5.23,5.30,5.36,5.42,5.49,5.56,
           5.62,5.69,5.76,5.83,5.90,5.97,6.04,6.12,6.19,6.26,6.34,6.42,
           6.49,6.57,6.65,6.73,6.81,6.90,6.98,7.06,7.15,7.23,7.32,7.41,
           7.50,7.59,7.68,7.77,7.87,7.96,8.06,8.16,8.25,8.35,8.45,8.56,
           8.66,8.76,8.87,8.98,9.09,9.20,9.31,9.42,9.53,9.65,9.76,9.88]
  };

  const SERIES_DESC = {
    E6:   "6 values per decade — coarse, high-tolerance applications.",
    E12:  "12 values per decade — common general-purpose series (default).",
    E24:  "24 values per decade — widely stocked, 5% tolerance.",
    E48:  "48 values per decade — precision 2% resistors.",
    E96:  "96 values per decade — high-precision 1% resistors.",
    E192: "192 values per decade — ultra-precision 0.5% resistors."
  };

  const DECADES = [1, 10, 100, 1e3, 1e4, 1e5, 1e6, 1e7, 1e8];
  const INF = Infinity;

  function buildValues(seriesName) {
    const base = E_SERIES[seriesName];
    const set = new Set();
    for (const decade of DECADES)
      for (const v of base)
        set.add(Math.round(v * decade * 1e6) / 1e6);
    set.add(0);
    set.add(INF);
    return Array.from(set).sort((a, b) => a - b);
  }

  function parallel(a, b) {
    if (a === 0 || b === 0) return 0;
    if (a === INF) return b;
    if (b === INF) return a;
    return 1 / (1/a + 1/b);
  }

  function seriesAdd(a, b) {
    const ra = a === INF ? 0 : a;
    const rb = b === INF ? 0 : b;
    return ra + rb;
  }

  // ── Calculators ────────────────────────────────────────────────────────────
  function calcParallelOnly(values, target) {
    let best = { error: INF };
    for (const R1 of values)
      for (const R2 of values) {
        const total = parallel(R1, R2);
        if (!isFinite(total)) continue;
        const error = Math.abs(total - target);
        if (error < best.error) best = { R1, R2, total, error };
      }
    return best;
  }

  function calcParallelThree(values, target) {
    let best = { error: INF };
    for (const R1 of values)
      for (const R2 of values)
        for (const R3 of values) {
          if (R1 === 0 || R2 === 0 || R3 === 0) {
            const error = Math.abs(0 - target);
            if (error < best.error) best = { R1, R2, R3, total: 0, error };
            continue;
          }
          const inv = (R1 === INF ? 0 : 1/R1)
                    + (R2 === INF ? 0 : 1/R2)
                    + (R3 === INF ? 0 : 1/R3);
          if (inv === 0) continue;
          const total = 1 / inv;
          const error = Math.abs(total - target);
          if (error < best.error) best = { R1, R2, R3, total, error };
        }
    return best;
  }

  function calcSeriesOnly(values, target) {
    let best = { error: INF };
    for (const R1 of values)
      for (const R2 of values) {
        const total = seriesAdd(R1, R2);
        const error = Math.abs(total - target);
        if (error < best.error) best = { R1, R2, total, error };
      }
    return best;
  }

  function calcSeriesThree(values, target) {
    let best = { error: INF };
    for (const R1 of values)
      for (const R2 of values)
        for (const R3 of values) {
          const total = (R1 === INF ? 0 : R1)
                      + (R2 === INF ? 0 : R2)
                      + (R3 === INF ? 0 : R3);
          const error = Math.abs(total - target);
          if (error < best.error) best = { R1, R2, R3, total, error };
        }
    return best;
  }

  function calcParallelPlusSeries(values, target) {
    let best = { error: INF };
    for (const R1 of values)
      for (const R2 of values) {
        const par = parallel(R1, R2);
        if (!isFinite(par)) continue;
        for (const Rs of values) {
          const total = par + (Rs === INF ? 0 : Rs);
          const error = Math.abs(total - target);
          if (error < best.error) best = { R1, R2, Rs, total, error };
        }
      }
    return best;
  }

  function calcParallelParallel(values, target) {
    let best = { error: INF };
    for (const R1 of values)
      for (const R2 of values) {
        const par1 = parallel(R1, R2);
        if (!isFinite(par1)) continue;
        for (const R3 of values)
          for (const R4 of values) {
            const par2 = parallel(R3, R4);
            if (!isFinite(par2)) continue;
            const total = par1 + par2;
            const error = Math.abs(total - target);
            if (error < best.error) best = { R1, R2, R3, R4, total, error };
          }
      }
    return best;
  }

  // ── Formatting ─────────────────────────────────────────────────────────────
  function fmtR(v) {
    if (v === 0)   return '0 Ω (jumper)';
    if (v === INF) return '∞ (not placed)';
    if (v >= 1e9)  return (v/1e9).toFixed(3).replace(/\.?0+$/,'') + ' GΩ';
    if (v >= 1e6)  return (v/1e6).toFixed(3).replace(/\.?0+$/,'') + ' MΩ';
    if (v >= 1e3)  return (v/1e3).toFixed(3).replace(/\.?0+$/,'') + ' kΩ';
    return v.toFixed(3).replace(/\.?0+$/,'') + ' Ω';
  }

  function fmtTotal(v) {
    if (v === INF) return '∞ Ω (open)';
    if (v >= 1e9)  return (v/1e9).toFixed(4) + ' GΩ  (' + v.toFixed(2) + ' Ω)';
    if (v >= 1e6)  return (v/1e6).toFixed(4) + ' MΩ  (' + v.toFixed(2) + ' Ω)';
    if (v >= 1e3)  return (v/1e3).toFixed(4) + ' kΩ  (' + v.toFixed(2) + ' Ω)';
    return v.toFixed(4) + ' Ω';
  }

function fmtError(total, target) {
    if (!isFinite(total) || !isFinite(target) || target === 0) return '—';
    const pct = ((total - target) / target) * 100;
    const abs = Math.abs(pct);
    const cls = abs < 1 ? 'error-good' : abs < 5 ? 'error-ok' : 'error-bad';

    const pctStr = pct.toFixed(6).replace(/\.?0+$/, '') + '%';

    const absErr = total - target;
    const absStr = (absErr >= 0 ? '+' : '') + fmtR(Math.abs(absErr)).replace(' (jumper)', '').replace(' (not placed)', '') ;
    const signedAbsStr = absErr < 0 ? '−' + fmtR(Math.abs(absErr)).replace(' (jumper)','').replace(' (not placed)','') : '+' + fmtR(Math.abs(absErr)).replace(' (jumper)','').replace(' (not placed)','');

    return `<span class="${cls}">${pctStr} &nbsp;(${signedAbsStr})</span>`;
  }
  
  function lblR(v) {
    if (v === 0)   return '0Ω';
    if (v === INF) return '∞';
    if (v >= 1e9)  return (v/1e9).toFixed(2).replace(/\.?0+$/,'') + 'G';
    if (v >= 1e6)  return (v/1e6).toFixed(2).replace(/\.?0+$/,'') + 'M';
    if (v >= 1e3)  return (v/1e3).toFixed(2).replace(/\.?0+$/,'') + 'k';
    return v.toFixed(2).replace(/\.?0+$/,'') + 'Ω';
  }

  // ── SVG helpers ────────────────────────────────────────────────────────────
  function svgRes(cx, cy, label) {
    const w = 28, h = 12;
    return `
      <rect x="${cx-w/2}" y="${cy-h/2}" width="${w}" height="${h}" rx="2" class="res"/>
      <text x="${cx}" y="${cy+4}" class="res-lbl">${label}</text>`;
  }

  function svgDot(x, y) {
    return `<circle cx="${x}" cy="${y}" r="2.5" class="node"/>`;
  }

  // ── SVG Circuits ───────────────────────────────────────────────────────────
  function svgParallel(R1, R2) {
    const ax=30, bx=150, ty=25, by=55, mid=90, my=(ty+by)/2;
    return `<svg width="180" height="80" class="circuit-svg">
      <line x1="${ax}" y1="${ty}" x2="${ax}" y2="${by}" class="wire"/>
      <line x1="${bx}" y1="${ty}" x2="${bx}" y2="${by}" class="wire"/>
      <line x1="${ax}" y1="${ty}" x2="${mid-14}" y2="${ty}" class="wire"/>
      <line x1="${mid+14}" y1="${ty}" x2="${bx}" y2="${ty}" class="wire"/>
      <line x1="${ax}" y1="${by}" x2="${mid-14}" y2="${by}" class="wire"/>
      <line x1="${mid+14}" y1="${by}" x2="${bx}" y2="${by}" class="wire"/>
      ${svgRes(mid, ty, lblR(R1))}
      ${svgRes(mid, by, lblR(R2))}
      <line x1="10"    y1="${my}" x2="${ax}"  y2="${my}" class="wire"/>
      <line x1="${ax}" y1="${my}" x2="${ax}"  y2="${ty}"  class="wire"/>
      <line x1="${ax}" y1="${my}" x2="${ax}"  y2="${by}"  class="wire"/>
      <line x1="${bx}" y1="${ty}" x2="${bx}"  y2="${my}"  class="wire"/>
      <line x1="${bx}" y1="${by}" x2="${bx}"  y2="${my}"  class="wire"/>
      <line x1="${bx}" y1="${my}" x2="170"   y2="${my}"  class="wire"/>
      ${svgDot(ax, my)}
      ${svgDot(bx, my)}
      <line x1="10"  y1="${my-6}" x2="10"  y2="${my+6}" class="term"/>
      <line x1="170" y1="${my-6}" x2="170" y2="${my+6}" class="term"/>
    </svg>`;
  }

  function svgParallelThree(R1, R2, R3) {
    const ax=30, bx=150, ty=15, my=45, by=75, mid=90, endx=170;
    return `<svg width="180" height="95" class="circuit-svg">
      <line x1="${ax}" y1="${ty}" x2="${ax}" y2="${by}" class="wire"/>
      <line x1="${bx}" y1="${ty}" x2="${bx}" y2="${by}" class="wire"/>
      <line x1="${ax}" y1="${ty}" x2="${mid-14}" y2="${ty}" class="wire"/>
      <line x1="${mid+14}" y1="${ty}" x2="${bx}" y2="${ty}" class="wire"/>
      <line x1="${ax}" y1="${my}" x2="${mid-14}" y2="${my}" class="wire"/>
      <line x1="${mid+14}" y1="${my}" x2="${bx}" y2="${my}" class="wire"/>
      <line x1="${ax}" y1="${by}" x2="${mid-14}" y2="${by}" class="wire"/>
      <line x1="${mid+14}" y1="${by}" x2="${bx}" y2="${by}" class="wire"/>
      ${svgRes(mid, ty, lblR(R1))}
      ${svgRes(mid, my, lblR(R2))}
      ${svgRes(mid, by, lblR(R3))}
      <line x1="10"    y1="${my}" x2="${ax}"   y2="${my}" class="wire"/>
      <line x1="${ax}" y1="${ty}" x2="${ax}"   y2="${my}"  class="wire"/>
      <line x1="${ax}" y1="${my}" x2="${ax}"   y2="${by}"  class="wire"/>
      <line x1="${bx}" y1="${ty}" x2="${bx}"   y2="${my}"  class="wire"/>
      <line x1="${bx}" y1="${my}" x2="${bx}"   y2="${by}"  class="wire"/>
      <line x1="${bx}" y1="${my}" x2="${endx}" y2="${my}"  class="wire"/>
      ${svgDot(ax, my)}
      ${svgDot(bx, my)}
      <line x1="10"      y1="${my-6}" x2="10"      y2="${my+6}" class="term"/>
      <line x1="${endx}"  y1="${my-6}" x2="${endx}"  y2="${my+6}" class="term"/>
    </svg>`;
  }

  function svgSeries(R1, R2) {
    const y=20;
    return `<svg width="200" height="40" class="circuit-svg">
      <line x1="10"  y1="${y}" x2="46"  y2="${y}" class="wire"/>
      ${svgRes(60,  y, lblR(R1))}
      <line x1="74"  y1="${y}" x2="126" y2="${y}" class="wire"/>
      ${svgRes(140, y, lblR(R2))}
      <line x1="154" y1="${y}" x2="190" y2="${y}" class="wire"/>
      <line x1="10"  y1="${y-6}" x2="10"  y2="${y+6}" class="term"/>
      <line x1="190" y1="${y-6}" x2="190" y2="${y+6}" class="term"/>
    </svg>`;
  }

  function svgSeriesThree(R1, R2, R3) {
    const y=20;
    return `<svg width="260" height="40" class="circuit-svg">
      <line x1="10"  y1="${y}" x2="36"  y2="${y}" class="wire"/>
      ${svgRes(50,  y, lblR(R1))}
      <line x1="64"  y1="${y}" x2="96"  y2="${y}" class="wire"/>
      ${svgRes(110, y, lblR(R2))}
      <line x1="124" y1="${y}" x2="156" y2="${y}" class="wire"/>
      ${svgRes(170, y, lblR(R3))}
      <line x1="184" y1="${y}" x2="250" y2="${y}" class="wire"/>
      <line x1="10"  y1="${y-6}" x2="10"  y2="${y+6}" class="term"/>
      <line x1="250" y1="${y-6}" x2="250" y2="${y+6}" class="term"/>
    </svg>`;
  }

  function svgParallelSeries(R1, R2, Rs) {
    const ty=20, by=60, my=(ty+by)/2;
    const ax=30, bx=150, mid=90;
    const resX=205, endx=250;
    return `<svg width="260" height="80" class="circuit-svg">
      <line x1="${ax}" y1="${ty}" x2="${ax}" y2="${by}" class="wire"/>
      <line x1="${bx}" y1="${ty}" x2="${bx}" y2="${by}" class="wire"/>
      <line x1="${ax}" y1="${ty}" x2="${mid-14}" y2="${ty}" class="wire"/>
      <line x1="${mid+14}" y1="${ty}" x2="${bx}" y2="${ty}" class="wire"/>
      <line x1="${ax}" y1="${by}" x2="${mid-14}" y2="${by}" class="wire"/>
      <line x1="${mid+14}" y1="${by}" x2="${bx}" y2="${by}" class="wire"/>
      ${svgRes(mid, ty, lblR(R1))}
      ${svgRes(mid, by, lblR(R2))}
      <line x1="10"    y1="${my}" x2="${ax}"      y2="${my}" class="wire"/>
      <line x1="${ax}" y1="${my}" x2="${ax}"      y2="${ty}"  class="wire"/>
      <line x1="${ax}" y1="${my}" x2="${ax}"      y2="${by}"  class="wire"/>
      <line x1="${bx}" y1="${ty}" x2="${bx}"      y2="${my}"  class="wire"/>
      <line x1="${bx}" y1="${by}" x2="${bx}"      y2="${my}"  class="wire"/>
      <line x1="${bx}" y1="${my}" x2="${resX-14}" y2="${my}"  class="wire"/>
      ${svgRes(resX, my, lblR(Rs))}
      <line x1="${resX+14}" y1="${my}" x2="${endx}" y2="${my}" class="wire"/>
      ${svgDot(ax, my)}
      ${svgDot(bx, my)}
      <line x1="10"      y1="${my-6}" x2="10"      y2="${my+6}" class="term"/>
      <line x1="${endx}"  y1="${my-6}" x2="${endx}"  y2="${my+6}" class="term"/>
    </svg>`;
  }

  function svgParallelParallel(R1, R2, R3, R4) {
    const ty=20, by=60, my=(ty+by)/2;
    const ax1=30,  bx1=110, ax2=130, bx2=210;
    const mid1=70, mid2=170, endx=250;
    return `<svg width="260" height="80" class="circuit-svg">
      <line x1="${ax1}" y1="${ty}" x2="${ax1}" y2="${by}" class="wire"/>
      <line x1="${bx1}" y1="${ty}" x2="${bx1}" y2="${by}" class="wire"/>
      <line x1="${ax1}" y1="${ty}" x2="${mid1-14}" y2="${ty}" class="wire"/>
      <line x1="${mid1+14}" y1="${ty}" x2="${bx1}" y2="${ty}" class="wire"/>
      <line x1="${ax1}" y1="${by}" x2="${mid1-14}" y2="${by}" class="wire"/>
      <line x1="${mid1+14}" y1="${by}" x2="${bx1}" y2="${by}" class="wire"/>
      ${svgRes(mid1, ty, lblR(R1))}
      ${svgRes(mid1, by, lblR(R2))}
      <line x1="${ax2}" y1="${ty}" x2="${ax2}" y2="${by}" class="wire"/>
      <line x1="${bx2}" y1="${ty}" x2="${bx2}" y2="${by}" class="wire"/>
      <line x1="${ax2}" y1="${ty}" x2="${mid2-14}" y2="${ty}" class="wire"/>
      <line x1="${mid2+14}" y1="${ty}" x2="${bx2}" y2="${ty}" class="wire"/>
      <line x1="${ax2}" y1="${by}" x2="${mid2-14}" y2="${by}" class="wire"/>
      <line x1="${mid2+14}" y1="${by}" x2="${bx2}" y2="${by}" class="wire"/>
      ${svgRes(mid2, ty, lblR(R3))}
      ${svgRes(mid2, by, lblR(R4))}
      <line x1="10"     y1="${my}" x2="${ax1}"  y2="${my}" class="wire"/>
      <line x1="${ax1}" y1="${my}" x2="${ax1}"  y2="${ty}"  class="wire"/>
      <line x1="${ax1}" y1="${my}" x2="${ax1}"  y2="${by}"  class="wire"/>
      <line x1="${bx1}" y1="${ty}" x2="${bx1}"  y2="${my}"  class="wire"/>
      <line x1="${bx1}" y1="${by}" x2="${bx1}"  y2="${my}"  class="wire"/>
      <line x1="${bx1}" y1="${my}" x2="${ax2}"  y2="${my}"  class="wire"/>
      <line x1="${ax2}" y1="${my}" x2="${ax2}"  y2="${ty}"  class="wire"/>
      <line x1="${ax2}" y1="${my}" x2="${ax2}"  y2="${by}"  class="wire"/>
      <line x1="${bx2}" y1="${ty}" x2="${bx2}"  y2="${my}"  class="wire"/>
      <line x1="${bx2}" y1="${by}" x2="${bx2}"  y2="${my}"  class="wire"/>
      <line x1="${bx2}" y1="${my}" x2="${endx}"  y2="${my}"  class="wire"/>
      ${svgDot(ax1, my)}
      ${svgDot(bx1, my)}
      ${svgDot(ax2, my)}
      ${svgDot(bx2, my)}
      <line x1="10"      y1="${my-6}" x2="10"      y2="${my+6}" class="term"/>
      <line x1="${endx}"  y1="${my-6}" x2="${endx}"  y2="${my+6}" class="term"/>
    </svg>`;
  }

  // ── Card builder ───────────────────────────────────────────────────────────
  function card(title, diagram, rows, totalR, target) {
    const rowsHtml = rows.map(([label, val]) =>
      `<tr><td>${label}</td><td>${fmtR(val)}</td></tr>`
    ).join('');
    return `
      <div class="card">
        <h3>${title}</h3>
        <div class="card-body">
          <div class="card-diagram">${diagram}</div>
          <div class="card-table">
            <table>
              ${rowsHtml}
              <tr><td>Total resistance</td><td>${fmtTotal(totalR)}</td></tr>
              <tr><td>Error vs target</td><td>${fmtError(totalR, target)}</td></tr>
            </table>
          </div>
        </div>
      </div>`;
  }

  function cardRow(cardA, cardB) {
    return `<div class="card-row">${cardA}${cardB}</div>`;
  }

  // ── UI ─────────────────────────────────────────────────────────────────────
  function updateSeriesInfo() {
    const name = document.getElementById('eseries').value;
    document.getElementById('seriesInfo').textContent = SERIES_DESC[name];
  }

  function calculate() {
    const target = parseFloat(document.getElementById('target').value);
    const out = document.getElementById('output');
    if (isNaN(target) || target < 0) {
      out.innerHTML = '<p style="color:red">Please enter a valid non-negative resistance value.</p>';
      return;
    }
    out.innerHTML = '<p class="loading">⏳ Calculating…</p>';
    setTimeout(() => {
      const values = buildValues(document.getElementById('eseries').value);
      const par   = calcParallelOnly(values, target);
      const par3  = calcParallelThree(values, target);
      const ser   = calcSeriesOnly(values, target);
      const ser3  = calcSeriesThree(values, target);
      const combo = calcParallelPlusSeries(values, target);
      const pp    = calcParallelParallel(values, target);

      out.innerHTML =
        cardRow(
          card('2 Resistors in Parallel',
            svgParallel(par.R1, par.R2),
            [['R1', par.R1], ['R2', par.R2]],
            par.total, target),
          card('3 Resistors in Parallel',
            svgParallelThree(par3.R1, par3.R2, par3.R3),
            [['R1', par3.R1], ['R2', par3.R2], ['R3', par3.R3]],
            par3.total, target)
        ) +
        cardRow(
          card('2 Resistors in Series',
            svgSeries(ser.R1, ser.R2),
            [['R1', ser.R1], ['R2', ser.R2]],
            ser.total, target),
          card('3 Resistors in Series',
            svgSeriesThree(ser3.R1, ser3.R2, ser3.R3),
            [['R1', ser3.R1], ['R2', ser3.R2], ['R3', ser3.R3]],
            ser3.total, target)
        ) +
        cardRow(
          card('(2 Parallel) + 1 Series',
            svgParallelSeries(combo.R1, combo.R2, combo.Rs),
            [['R1 (parallel)', combo.R1], ['R2 (parallel)', combo.R2],
             ['Rs (series)', combo.Rs]],
            combo.total, target),
          card('(2 Parallel) + (2 Parallel)',
            svgParallelParallel(pp.R1, pp.R2, pp.R3, pp.R4),
            [['R1 (block 1)', pp.R1], ['R2 (block 1)', pp.R2],
             ['R3 (block 2)', pp.R3], ['R4 (block 2)', pp.R4]],
            pp.total, target)
        );

    }, 20);
  }

  updateSeriesInfo();
</script>
</body>

</html>
